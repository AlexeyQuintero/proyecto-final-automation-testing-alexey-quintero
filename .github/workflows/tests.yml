name: Tests automatizados

on:
  push:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Chromium y ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          export CHROME_BIN=$(which chromium-browser)
          export CHROMEDRIVER=$(which chromedriver)
          echo "Chrome path: $CHROME_BIN"
          echo "Driver path: $CHROMEDRIVER"

      - name: Ejecutar pruebas (modo incógnito)
        env:
          CHROME_BIN: /usr/bin/chromium-browser
          CHROMEDRIVER: /usr/bin/chromedriver
          SELENIUM_OPTS: "--incognito"
        run: pytest --html=report.html

      - name: Guardar reporte como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: reporte-pytest-html
          path: report.html
